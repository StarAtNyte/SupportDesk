<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #060c1a;
      --bg2:        #0a1326;
      --surface:    #0f1c33;
      --surface2:   #152440;
      --border:     #1e3354;
      --border2:    #243d63;
      --text:       #e2eaf6;
      --muted:      #5a7699;
      --muted2:     #3d5a7a;
      --accent:     #22d3ee;
      --accent-dim: rgba(34,211,238,0.12);
      --accent-glow:rgba(34,211,238,0.25);
      --green:      #34d399;
      --green-glow: rgba(52,211,153,0.2);
      --amber:      #fbbf24;
      --amber-glow: rgba(251,191,36,0.18);
      --red:        #f87171;
      --radius:     12px;
      --font-ui:    'Syne', system-ui, sans-serif;
      --font-mono:  'DM Mono', monospace;
    }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      /* Dot-grid texture */
      background-image: radial-gradient(circle, rgba(34,211,238,0.06) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* ── Page fade-in ── */
    @keyframes pageFade {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    body { animation: pageFade 0.4s ease forwards; }

    /* ── Header ── */
    header {
      background: rgba(6,12,26,0.85);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 0 32px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-mark {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent) 0%, #818cf8 100%);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(34,211,238,0.3);
    }

    .logo-mark svg { color: #fff; }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .brand-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .brand-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    #ws-status {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 6px 14px 6px 10px;
      font-size: 12px;
      font-weight: 500;
      transition: border-color 0.3s;
    }
    #ws-status.live { border-color: var(--green); }

    #ws-dot {
      position: relative;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    #ws-dot.connected {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
    }
    #ws-dot.connected::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 1.5px solid var(--green);
      opacity: 0;
      animation: pulse-ring 2s ease-out infinite;
    }
    @keyframes pulse-ring {
      0%   { transform: scale(0.8); opacity: 0.8; }
      100% { transform: scale(2);   opacity: 0; }
    }
    #ws-label { color: var(--muted); letter-spacing: 0.01em; }

    /* ── Main ── */
    main {
      max-width: 1040px;
      margin: 36px auto;
      padding: 0 24px 80px;
    }

    /* ── Stats ── */
    #stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 36px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      display: flex;
      align-items: center;
      gap: 18px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .stat-card:hover { border-color: var(--border2); }

    .stat-card.pending::before { background: linear-gradient(135deg, rgba(251,191,36,0.04) 0%, transparent 60%); }
    .stat-card.ready::before   { background: linear-gradient(135deg, rgba(34,211,238,0.04) 0%, transparent 60%); }
    .stat-card.active::before  { background: linear-gradient(135deg, rgba(52,211,153,0.04) 0%, transparent 60%); }
    .stat-card:hover::before   { opacity: 1; }

    .stat-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 22px;
    }
    .stat-card.pending .stat-icon { background: var(--amber-glow); }
    .stat-card.ready   .stat-icon { background: var(--accent-dim); }
    .stat-card.active  .stat-icon { background: var(--green-glow); }

    .stat-body { flex: 1; }
    .stat-body .value {
      font-size: 34px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
    }
    .stat-card.pending .value { color: var(--amber); }
    .stat-card.ready   .value { color: var(--accent); }
    .stat-card.active  .value { color: var(--green); }

    .stat-body .label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-header h2 {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    #session-count {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 3px 12px;
      letter-spacing: 0.03em;
    }

    /* ── Session list ── */
    #sessions-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: slideIn 0.2s ease;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .session-card:hover {
      background: var(--surface2);
      border-color: var(--border2);
    }
    .session-card.pending { border-left: 3px solid var(--amber); }
    .session-card.ready   {
      border-left: 3px solid var(--accent);
      box-shadow: -4px 0 20px rgba(34,211,238,0.08);
    }
    .session-card.active  {
      border-left: 3px solid var(--green);
      box-shadow: -4px 0 20px rgba(52,211,153,0.08);
    }
    .session-card.closed { opacity: 0.3; pointer-events: none; }

    /* Avatar */
    .session-avatar {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
      flex-shrink: 0;
      background: var(--surface2);
      color: var(--accent);
      border: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.01em;
    }

    .session-info { flex: 1; min-width: 0; }
    .session-name {
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.01em;
    }
    .session-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }
    .session-message {
      font-size: 12px;
      color: var(--muted2);
      margin-top: 5px;
      font-style: italic;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-rdid {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 3px;
      flex-shrink: 0;
    }
    .session-rdid.empty {
      font-size: 11px;
      color: var(--muted2);
      font-family: var(--font-ui);
      font-weight: 500;
      letter-spacing: 0;
      font-style: italic;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      flex-shrink: 0;
    }
    .badge::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .badge.pending { background: rgba(251,191,36,0.12); color: var(--amber); }
    .badge.pending::before { background: var(--amber); }
    .badge.ready   { background: var(--accent-dim); color: var(--accent); }
    .badge.ready::before   { background: var(--accent); }
    .badge.active  { background: var(--green-glow); color: var(--green); }
    .badge.active::before  { background: var(--green); box-shadow: 0 0 5px var(--green); animation: pulse-ring 2s ease-out infinite; }
    .badge.closed  { background: rgba(94,114,143,0.12); color: var(--muted); }
    .badge.closed::before  { background: var(--muted2); }

    /* Actions */
    .session-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
      font-family: var(--font-ui);
    }

    .btn-connect {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-connect:disabled { opacity: 0.3; cursor: default; }
    .btn-connect.ready-glow {
      background: var(--green);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 0 16px var(--green-glow);
    }
    .btn-connect.ready-glow:hover:not(:disabled) {
      background: #2dd4a0;
      box-shadow: 0 0 24px rgba(52,211,153,0.4);
    }

    .btn-close {
      background: transparent;
      color: var(--muted2);
      border: 1px solid var(--border);
    }
    .btn-close:hover {
      background: rgba(248,113,113,0.08);
      border-color: rgba(248,113,113,0.3);
      color: var(--red);
    }

    /* Empty state */
    #empty {
      text-align: center;
      padding: 100px 20px;
      color: var(--muted);
    }
    .empty-glyph {
      width: 64px; height: 64px;
      border-radius: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin: 0 auto 20px;
      opacity: 0.6;
    }
    #empty p { font-size: 15px; font-weight: 600; color: var(--muted); }
    #empty small { font-size: 12px; color: var(--muted2); margin-top: 8px; display: block; line-height: 1.7; }

    .dot { opacity: 0.3; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <div class="logo-mark">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <div class="brand">
        <div class="brand-name">Support Dashboard</div>
        <div class="brand-sub">Agent View</div>
      </div>
    </div>
    <div id="ws-status">
      <div id="ws-dot"></div>
      <span id="ws-label">Connecting…</span>
    </div>
  </header>

  <main>
    <div id="stats">
      <div class="stat-card pending">
        <div class="stat-icon">⏳</div>
        <div class="stat-body">
          <div class="value" id="count-pending">0</div>
          <div class="label">Waiting</div>
        </div>
      </div>
      <div class="stat-card ready">
        <div class="stat-icon">⚡</div>
        <div class="stat-body">
          <div class="value" id="count-ready">0</div>
          <div class="label">Ready</div>
        </div>
      </div>
      <div class="stat-card active">
        <div class="stat-icon">🟢</div>
        <div class="stat-body">
          <div class="value" id="count-active">0</div>
          <div class="label">Active</div>
        </div>
      </div>
    </div>

    <div class="section-header">
      <h2>Sessions</h2>
      <span id="session-count">0 open</span>
    </div>
    <div id="sessions-list">
      <div id="empty">
        <div class="empty-glyph">🖥️</div>
        <p>No active support sessions</p>
        <small>Sessions appear here in real-time<br>when clients request support</small>
      </div>
    </div>
  </main>

  <script>
    const sessions = {};

    function connect() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${proto}://${location.host}/ws/agent`);

      ws.onopen = () => {
        const dot   = document.getElementById("ws-dot");
        const label = document.getElementById("ws-label");
        const badge = document.getElementById("ws-status");
        dot.classList.add("connected");
        label.textContent = "Live";
        badge.classList.add("live");
      };

      ws.onclose = () => {
        const dot   = document.getElementById("ws-dot");
        const label = document.getElementById("ws-label");
        const badge = document.getElementById("ws-status");
        dot.classList.remove("connected");
        label.textContent = "Reconnecting…";
        badge.classList.remove("live");
        setTimeout(connect, 3000);
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === "initial") {
          msg.sessions.forEach((s) => { sessions[s.id] = s; });
        } else if (msg.type === "new_session" || msg.type === "session_updated") {
          sessions[msg.session.id] = msg.session;
          if (msg.type === "new_session") notifyAgent(msg.session);
        }
        render();
      };
    }

    if (Notification.permission === "default") Notification.requestPermission();

    function notifyAgent(session) {
      if (Notification.permission === "granted") {
        new Notification("New Support Request", {
          body: `Session ${session.id.slice(0, 8).toUpperCase()} — waiting for installer`,
          icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><text y='20' font-size='20'>💬</text></svg>",
        });
      }
    }

    function render() {
      const list = Object.values(sessions).sort(
        (a, b) => new Date(b.created_at) - new Date(a.created_at)
      );

      const pending = list.filter(s => s.status === "pending").length;
      const ready   = list.filter(s => s.status === "ready").length;
      const active  = list.filter(s => s.status === "active").length;
      document.getElementById("count-pending").textContent = pending;
      document.getElementById("count-ready").textContent   = ready;
      document.getElementById("count-active").textContent  = active;

      const container = document.getElementById("sessions-list");
      const visible   = list.filter(s => s.status !== "closed");
      document.getElementById("session-count").textContent = `${visible.length} open`;

      if (visible.length === 0) {
        container.innerHTML = `
          <div id="empty">
            <div class="empty-glyph">🖥️</div>
            <p>No active support sessions</p>
            <small>Sessions appear here in real-time<br>when clients request support</small>
          </div>`;
        return;
      }

      container.innerHTML = visible.map(s => {
        const shortId     = s.id.slice(0, 8).toUpperCase();
        const ago         = timeAgo(s.created_at);
        const displayName = s.name ? escHtml(s.name) : `Session ${shortId}`;
        const initials    = displayName.slice(0, 2).toUpperCase();
        const msgLine     = s.message
          ? `<div class="session-message" title="${escHtml(s.message)}">&ldquo;${escHtml(s.message)}&rdquo;</div>`
          : "";
        const rdid = s.rustdesk_id
          ? `<div class="session-rdid">${s.rustdesk_id}</div>`
          : s.status === "ready"
            ? `<div class="session-rdid empty">Ask user for ID</div>`
            : `<div class="session-rdid empty">Installing…</div>`;
        const canConnect = s.status === "ready" && s.rustdesk_id;
        const connectCls = canConnect ? "btn-connect ready-glow" : "btn-connect";

        return `
        <div class="session-card ${s.status}" id="card-${s.id}">
          <div class="session-avatar">${initials}</div>
          <div class="session-info">
            <div class="session-name">${displayName}</div>
            <div class="session-meta">
              <span>${ago}</span>
              <span class="dot">·</span>
              <span style="font-family:var(--font-mono);font-size:10px">#${shortId}</span>
            </div>
            ${msgLine}
          </div>
          ${rdid}
          <span class="badge ${s.status}">${s.status}</span>
          <div class="session-actions">
            <button class="btn ${connectCls}"
              onclick="connectSession('${s.id}','${s.rustdesk_id || ""}')"
              ${canConnect ? "" : "disabled"}>
              Connect
            </button>
            <button class="btn btn-close" onclick="closeSession('${s.id}')">
              Close
            </button>
          </div>
        </div>`;
      }).join("");
    }

    function connectSession(id, rdId) {
      if (!rdId) return;
      fetch(`/api/session/${id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: "active" }),
      });
      window.location.href = `rustdesk://connect/${rdId}`;
    }

    function closeSession(id) {
      fetch(`/api/session/${id}`, { method: "DELETE" }).then(() => {
        sessions[id] = { ...sessions[id], status: "closed" };
        render();
      });
    }

    function timeAgo(iso) {
      const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
      if (diff < 60)   return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      return `${Math.floor(diff / 3600)}h ago`;
    }

    function escHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    connect();
    setInterval(render, 30000);
  </script>
</body>
</html>
