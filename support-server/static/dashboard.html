<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Support Dashboard</title>
        <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            :root {
                --bg:        #0f172a;
                --surface:   #1e293b;
                --surface2:  #263347;
                --border:    #334155;
                --text:      #f1f5f9;
                --muted:     #94a3b8;
                --accent:    #3b82f6;
                --accent-hi: #60a5fa;
                --green:     #22c55e;
                --amber:     #f59e0b;
                --red:       #ef4444;
                --radius:    14px;
            }

            body {
                font-family: system-ui, -apple-system, sans-serif;
                background: var(--bg);
                color: var(--text);
                min-height: 100vh;
                line-height: 1.5;
            }

            /* ── Header ─────────────────────────────────────────────────────── */
            header {
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                padding: 0 32px;
                height: 60px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                position: sticky;
                top: 0;
                z-index: 10;
            }
            .header-left {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .logo-icon {
                width: 34px; height: 34px;
                background: var(--accent);
                border-radius: 9px;
                display: flex; align-items: center; justify-content: center;
                flex-shrink: 0;
            }
            header h1 {
                font-size: 16px;
                font-weight: 700;
                letter-spacing: -0.01em;
            }
            header h1 span {
                color: var(--muted);
                font-weight: 400;
                margin-left: 6px;
                font-size: 14px;
            }
            #ws-status {
                font-size: 12px;
                display: flex;
                align-items: center;
                gap: 7px;
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: 99px;
                padding: 5px 12px;
            }
            #ws-dot {
                width: 7px; height: 7px;
                border-radius: 50%;
                background: var(--red);
                transition: background 0.3s;
                flex-shrink: 0;
            }
            #ws-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
            #ws-label { color: var(--muted); }

            /* ── Main layout ─────────────────────────────────────────────────── */
            main {
                max-width: 1000px;
                margin: 32px auto;
                padding: 0 24px;
            }

            /* ── Stats ───────────────────────────────────────────────────────── */
            #stats {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 14px;
                margin-bottom: 32px;
            }
            .stat-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 20px 22px;
                display: flex;
                align-items: center;
                gap: 16px;
            }
            .stat-icon {
                width: 44px; height: 44px;
                border-radius: 12px;
                display: flex; align-items: center; justify-content: center;
                font-size: 20px;
                flex-shrink: 0;
            }
            .stat-card.pending .stat-icon { background: rgba(245,158,11,0.15); }
            .stat-card.ready   .stat-icon { background: rgba(59,130,246,0.15); }
            .stat-card.active  .stat-icon { background: rgba(34,197,94,0.15);  }
            .stat-body .value {
                font-size: 30px;
                font-weight: 800;
                line-height: 1;
            }
            .stat-card.pending .value { color: var(--amber); }
            .stat-card.ready   .value { color: var(--accent-hi); }
            .stat-card.active  .value { color: var(--green); }
            .stat-body .label {
                font-size: 12px;
                color: var(--muted);
                margin-top: 4px;
                font-weight: 500;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            /* ── Section header ──────────────────────────────────────────────── */
            .section-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 14px;
            }
            .section-header h2 {
                font-size: 14px;
                font-weight: 600;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.06em;
            }
            #session-count {
                font-size: 12px;
                color: var(--muted);
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 99px;
                padding: 2px 10px;
            }

            /* ── Session cards ───────────────────────────────────────────────── */
            #sessions-list {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .session-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 18px 22px;
                display: flex;
                align-items: center;
                gap: 16px;
                animation: slideIn 0.18s ease;
                transition: border-color 0.2s;
            }
            .session-card:hover { border-color: #475569; }
            .session-card.ready  { border-left: 3px solid var(--accent); }
            .session-card.active { border-left: 3px solid var(--green); }
            .session-card.pending { border-left: 3px solid var(--amber); }
            .session-card.closed { opacity: 0.35; }

            @keyframes slideIn {
                from { opacity: 0; transform: translateY(-5px); }
                to   { opacity: 1; transform: translateY(0); }
            }

            /* Avatar */
            .session-avatar {
                width: 40px; height: 40px; border-radius: 10px;
                display: flex; align-items: center; justify-content: center;
                font-size: 16px; font-weight: 700; flex-shrink: 0;
                background: var(--surface2);
                color: var(--accent-hi);
                border: 1px solid var(--border);
                text-transform: uppercase;
            }

            .session-info { flex: 1; min-width: 0; }
            .session-name {
                font-weight: 600; font-size: 14px;
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            }
            .session-meta {
                font-size: 12px; color: var(--muted); margin-top: 4px;
                display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
            }
            .session-message {
                font-size: 12px; color: #64748b; margin-top: 4px;
                font-style: italic; overflow: hidden;
                text-overflow: ellipsis; white-space: nowrap;
            }

            .session-rdid {
                font-family: 'SF Mono', 'Fira Code', monospace;
                font-size: 20px; font-weight: 700;
                color: var(--accent-hi);
                letter-spacing: 2px;
                flex-shrink: 0;
            }
            .session-rdid.empty {
                font-size: 12px; color: var(--muted);
                font-family: inherit; font-weight: 400; letter-spacing: 0;
            }

            /* Badge */
            .badge {
                display: inline-flex; align-items: center; gap: 5px;
                padding: 3px 9px; border-radius: 99px;
                font-size: 11px; font-weight: 600;
                text-transform: uppercase; letter-spacing: 0.04em;
                flex-shrink: 0;
            }
            .badge::before {
                content: ''; width: 5px; height: 5px; border-radius: 50%;
            }
            .badge.pending { background: rgba(245,158,11,0.15); color: #fbbf24; }
            .badge.pending::before { background: var(--amber); }
            .badge.ready   { background: rgba(59,130,246,0.15); color: var(--accent-hi); }
            .badge.ready::before   { background: var(--accent); }
            .badge.active  { background: rgba(34,197,94,0.15);  color: #4ade80; }
            .badge.active::before  { background: var(--green); box-shadow: 0 0 4px var(--green); }
            .badge.closed  { background: rgba(100,116,139,0.15); color: #64748b; }
            .badge.closed::before  { background: #475569; }

            /* Actions */
            .session-actions {
                display: flex; gap: 8px; flex-shrink: 0;
            }
            .btn {
                padding: 8px 16px; border: none; border-radius: 8px;
                font-size: 13px; font-weight: 600; cursor: pointer;
                transition: background 0.15s, opacity 0.15s;
            }
            .btn-connect {
                background: var(--accent); color: #fff;
            }
            .btn-connect:hover:not(:disabled) { background: #2563eb; }
            .btn-connect:disabled { opacity: 0.35; cursor: default; }
            .btn-connect.ready-glow {
                background: var(--green);
                box-shadow: 0 0 12px rgba(34,197,94,0.4);
            }
            .btn-connect.ready-glow:hover:not(:disabled) { background: #16a34a; }
            .btn-close {
                background: var(--surface2); color: var(--muted);
                border: 1px solid var(--border);
            }
            .btn-close:hover { background: #334155; color: var(--text); }

            /* Empty state */
            #empty {
                text-align: center; padding: 80px 20px; color: var(--muted);
            }
            #empty .empty-icon {
                font-size: 48px; margin-bottom: 16px; opacity: 0.5;
            }
            #empty p { font-size: 15px; }
            #empty small { font-size: 13px; color: #475569; margin-top: 6px; display: block; }

            /* Dot separator */
            .dot { opacity: 0.4; }
        </style>
    </head>
    <body>
        <header>
            <div class="header-left">
                <div class="logo-icon">
                    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                </div>
                <h1>Support Dashboard <span>Agent View</span></h1>
            </div>
            <div id="ws-status">
                <div id="ws-dot"></div>
                <span id="ws-label">Connecting…</span>
            </div>
        </header>

        <main>
            <div id="stats">
                <div class="stat-card pending">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-body">
                        <div class="value" id="count-pending">0</div>
                        <div class="label">Waiting</div>
                    </div>
                </div>
                <div class="stat-card ready">
                    <div class="stat-icon">🔵</div>
                    <div class="stat-body">
                        <div class="value" id="count-ready">0</div>
                        <div class="label">Ready</div>
                    </div>
                </div>
                <div class="stat-card active">
                    <div class="stat-icon">🟢</div>
                    <div class="stat-body">
                        <div class="value" id="count-active">0</div>
                        <div class="label">Active</div>
                    </div>
                </div>
            </div>

            <div class="section-header">
                <h2>Sessions</h2>
                <span id="session-count">0 open</span>
            </div>
            <div id="sessions-list">
                <div id="empty">
                    <div class="empty-icon">🖥️</div>
                    <p>No active support sessions</p>
                    <small>Sessions appear here in real-time when clients request support</small>
                </div>
            </div>
        </main>

        <script>
            const sessions = {};

            // ── WebSocket ────────────────────────────────────────────────────────
            function connect() {
                const proto = location.protocol === "https:" ? "wss" : "ws";
                const ws = new WebSocket(`${proto}://${location.host}/ws/agent`);

                ws.onopen = () => {
                    document.getElementById("ws-dot").classList.add("connected");
                    document.getElementById("ws-label").textContent = "Live";
                };

                ws.onclose = () => {
                    document.getElementById("ws-dot").classList.remove("connected");
                    document.getElementById("ws-label").textContent = "Reconnecting…";
                    setTimeout(connect, 3000);
                };

                ws.onmessage = (e) => {
                    const msg = JSON.parse(e.data);
                    if (msg.type === "initial") {
                        msg.sessions.forEach((s) => { sessions[s.id] = s; });
                    } else if (msg.type === "new_session" || msg.type === "session_updated") {
                        sessions[msg.session.id] = msg.session;
                        if (msg.type === "new_session") notifyAgent(msg.session);
                    }
                    render();
                };
            }

            // ── Notifications ────────────────────────────────────────────────────
            if (Notification.permission === "default") Notification.requestPermission();

            function notifyAgent(session) {
                if (Notification.permission === "granted") {
                    new Notification("New Support Request", {
                        body: `Session ${session.id.slice(0, 8).toUpperCase()} — waiting for installer`,
                        icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><text y='20' font-size='20'>💬</text></svg>",
                    });
                }
            }

            // ── Render ───────────────────────────────────────────────────────────
            function render() {
                const list = Object.values(sessions).sort(
                    (a, b) => new Date(b.created_at) - new Date(a.created_at)
                );

                const pending = list.filter(s => s.status === "pending").length;
                const ready   = list.filter(s => s.status === "ready").length;
                const active  = list.filter(s => s.status === "active").length;
                document.getElementById("count-pending").textContent = pending;
                document.getElementById("count-ready").textContent   = ready;
                document.getElementById("count-active").textContent  = active;

                const container = document.getElementById("sessions-list");
                const visible   = list.filter(s => s.status !== "closed");

                document.getElementById("session-count").textContent =
                    `${visible.length} open`;

                if (visible.length === 0) {
                    container.innerHTML = `
                        <div id="empty">
                            <div class="empty-icon">🖥️</div>
                            <p>No active support sessions</p>
                            <small>Sessions appear here in real-time when clients request support</small>
                        </div>`;
                    return;
                }

                container.innerHTML = visible.map(s => {
                    const shortId     = s.id.slice(0, 8).toUpperCase();
                    const ago         = timeAgo(s.created_at);
                    const displayName = s.name ? escHtml(s.name) : `Session ${shortId}`;
                    const initials    = displayName.slice(0, 2).toUpperCase();
                    const msgLine     = s.message
                        ? `<div class="session-message" title="${escHtml(s.message)}">&ldquo;${escHtml(s.message)}&rdquo;</div>`
                        : "";
                    const rdid = s.rustdesk_id
                        ? `<div class="session-rdid">${s.rustdesk_id}</div>`
                        : s.status === "ready"
                            ? `<div class="session-rdid empty">Ask user for ID</div>`
                            : `<div class="session-rdid empty">Installing…</div>`;
                    const canConnect  = s.status === "ready" && s.rustdesk_id;
                    const connectCls  = canConnect ? "btn-connect ready-glow" : "btn-connect";

                    return `
                    <div class="session-card ${s.status}" id="card-${s.id}">
                        <div class="session-avatar">${initials}</div>
                        <div class="session-info">
                            <div class="session-name">${displayName}</div>
                            <div class="session-meta">
                                <span>${ago}</span>
                                <span class="dot">·</span>
                                <span>#${shortId}</span>
                            </div>
                            ${msgLine}
                        </div>
                        ${rdid}
                        <span class="badge ${s.status}">${s.status}</span>
                        <div class="session-actions">
                            <button class="btn ${connectCls}"
                                onclick="connectSession('${s.id}','${s.rustdesk_id || ""}')"
                                ${canConnect ? "" : "disabled"}>
                                Connect
                            </button>
                            <button class="btn btn-close" onclick="closeSession('${s.id}')">
                                Close
                            </button>
                        </div>
                    </div>`;
                }).join("");
            }

            function connectSession(id, rdId) {
                if (!rdId) return;
                fetch(`/api/session/${id}`, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ status: "active" }),
                });
                window.location.href = `rustdesk://connect/${rdId}`;
            }

            function closeSession(id) {
                fetch(`/api/session/${id}`, { method: "DELETE" }).then(() => {
                    sessions[id] = { ...sessions[id], status: "closed" };
                    render();
                });
            }

            function timeAgo(iso) {
                const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
                if (diff < 60)   return `${diff}s ago`;
                if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
                return `${Math.floor(diff / 3600)}h ago`;
            }

            function escHtml(s) {
                return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            }

            connect();
            setInterval(render, 30000);
        </script>
    </body>
</html>
